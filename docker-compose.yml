# Local development only. Does not touch host nginx.
# VDS path deploy: https://atorichko.asur-adigital.ru/YaDirect-analytics/
# — см. infra/nginx/atorichko.asur-adigital.ru-locations.conf.example

name: yadirect-analytics

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit
    ports:
      - "5433:5432"
    volumes:
      - audit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://audit:audit@db:5432/audit
      DATABASE_URL_SYNC: postgresql+psycopg://audit:audit@db:5432/audit
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: local
      JWT_SECRET_KEY: local-dev-secret-change-me-32chars-minimum!!
      CORS_ORIGINS: http://localhost:3000,https://atorichko.asur-adigital.ru
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://audit:audit@db:5432/audit
      DATABASE_URL_SYNC: postgresql+psycopg://audit:audit@db:5432/audit
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: local
      JWT_SECRET_KEY: local-dev-secret-change-me-32chars-minimum!!
    volumes:
      - ./apps/backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=INFO

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_V1_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_BASE_PATH: ""
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  audit_pg_data:
  frontend_node_modules:
